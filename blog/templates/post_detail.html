{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h1 class="mb-3">{{ post.title }}</h1>
            <p class="text-muted">By {{ post.author }} • {{ post.created_on|date:"M d, Y" }}</p>
            <div class="mb-4">
                {{ post.content|linebreaks }}
            </div>
            <a href="{% url 'home' %}" class="btn btn-secondary">Back to all posts</a>
        </div>
    </div>
</div>
{% endblock %}
