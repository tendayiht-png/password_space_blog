{% extends "base.html" %}
{% load static %}

{% block content %}
<main class="container py-4">
  <img src="{% static 'images/blog_image_2.jpg' %}" alt="Handset Screen Image" style="width: 100%; border-radius: 12px; margin-bottom: 24px;">
        <!-- Welcome Back panel -->
    <article class="hero-card">
      <span class="badge">Account Access</span>
      <h1>Welcome Back</h1>
      <p>
        Sign in to your account to access your settings and manage your security preferences.
      </p>
      <div class="pill-row">
        <span class="pill">Secure JWT</span>
        <span class="pill">HttpOnly Cookies</span>
        <span class="pill">Stay Logged In</span>
      </div>
    </article>

    <!-- Login form panel -->
    <article class="hero-card">
      <form id="loginForm" class="auth-form">
        {% csrf_token %}
        
        <div class="field">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username"
            placeholder="Enter your username"
            required
            autocomplete="username"
          >
          <p id="usernameError" class="field-error" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="Enter your email"
            required
            autocomplete="email"
          >
          <p id="emailError" class="field-error" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="telephone">Telephone</label>
          <input
            type="tel"
            id="telephone"
            name="telephone"
            placeholder="Enter your telephone number"
            required
            autocomplete="tel"
          >
          <p id="telephoneError" class="field-error" aria-live="polite"></p>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div style="position: relative;">
            <input 
              type="password" 
              id="password" 
              name="password"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
              style="padding-right: 44px;"
            >
            <button
              type="button"
              id="togglePassword"
              aria-label="Show password"
              style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 4px; color: var(--muted);"
            >
              <!-- Eye icon (show) -->
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <!-- Eye-off icon (hide) -->
              <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <p id="passwordError" class="field-error" aria-live="polite"></p>
        </div>

        <div class="field" style="margin-bottom: 0.5rem;">
          <label style="display: flex; align-items: center; cursor: pointer;">
            <input 
              type="checkbox" 
              id="rememberMe" 
              name="remember_me"
              style="width: 18px; height: 18px; margin-right: 0.5rem; cursor: pointer;"
            >
            <span style="font-size: 0.875rem; color: #374151;">
              Keep me logged in (up to 30 days)
            </span>
          </label>
        </div>

        <div class="hero-actions">
          <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
          <a href="{% url 'forgot_password_page' %}" class="btn btn-secondary">Forgot Password?</a>
        </div>
            
        <div id="formResult" class="form-result" style="display: none;"></div>
      </form>
    </article>
  </div>
</main>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const form = document.getElementById('loginForm');
  const usernameInput = document.getElementById('username');
  const emailInput = document.getElementById('email');
  const telephoneInput = document.getElementById('telephone');
  const passwordInput = document.getElementById('password');
  const rememberMeCheckbox = document.getElementById('rememberMe');
  const loginBtn = document.getElementById('loginBtn');
  const resultDiv = document.getElementById('formResult');
  const usernameError = document.getElementById('usernameError');
  const emailError = document.getElementById('emailError');
  const telephoneError = document.getElementById('telephoneError');
  const passwordError = document.getElementById('passwordError');

  // Clear errors on input
  usernameInput.addEventListener('input', () => usernameError.textContent = '');
  emailInput.addEventListener('input', () => emailError.textContent = '');
  telephoneInput.addEventListener('input', () => telephoneError.textContent = '');
  passwordInput.addEventListener('input', () => passwordError.textContent = '');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    // Reset errors
    usernameError.textContent = '';
    emailError.textContent = '';
    telephoneError.textContent = '';
    passwordError.textContent = '';
    resultDiv.style.display = 'none';

    const username = usernameInput.value.trim();
    const email = emailInput.value.trim();
    const telephone = telephoneInput.value.trim();
    const password = passwordInput.value;
    const rememberMe = rememberMeCheckbox.checked;

    if (!username) {
      usernameError.textContent = 'Username is required.';
      return;
    }

    if (!email) {
      emailError.textContent = 'Email is required.';
      return;
    }

    if (!telephone) {
      telephoneError.textContent = 'Telephone is required.';
      return;
    }

    if (!password) {
      passwordError.textContent = 'Password is required.';
      return;
    }

    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    // Disable button during request
    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in...';

    try {
      const response = await fetch('/API/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken,
          'Referer': window.location.href
        },
        body: JSON.stringify({
          username: username,
          email: email,
          telephone: telephone,
          password: password,
          remember_me: rememberMe
        })
      });

      const data = await response.json();

      if (response.ok && data.ok) {
        showMessage('Login successful! Redirecting...', 'success');
        
        // Redirect to My Ideas (fallback if API omits redirect)
        setTimeout(() => {
          window.location.href = data.redirect || '/ideas/my/';
        }, 1000);
      } else {
        showMessage(data.message || 'Invalid username, email, telephone, or password.', 'error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    } catch (error) {
      showMessage('An error occurred. Please try again.', 'error');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
    }
  });

  function showMessage(message, type) {
    resultDiv.textContent = message;
    resultDiv.className = 'form-result ' + type;
    resultDiv.style.display = 'block';
  }

  // Show/hide password toggle
  const toggleBtn = document.getElementById('togglePassword');
  const eyeIcon = document.getElementById('eyeIcon');
  const eyeOffIcon = document.getElementById('eyeOffIcon');

  toggleBtn.addEventListener('click', function () {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    eyeIcon.style.display = isHidden ? 'none' : 'inline';
    eyeOffIcon.style.display = isHidden ? 'inline' : 'none';
    toggleBtn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
  });
});
</script>
{% endblock %}
