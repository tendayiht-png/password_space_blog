# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest pytest-django
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      id: pytest
      continue-on-error: true
      shell: bash
      run: |
        mkdir -p test-results
        set -o pipefail
        pytest -ra --tb=short --junitxml=test-results/pytest.xml | tee test-results/pytest-output.txt
    - name: Upload pytest artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-results-py${{ matrix.python-version }}
        path: test-results/
        if-no-files-found: ignore
    - name: Summarize pytest failure
      if: steps.pytest.outcome == 'failure'
      shell: bash
      run: |
        {
          echo "## Pytest failure summary"
          echo
          echo "The full pytest output and JUnit XML report are attached as workflow artifacts."
          echo
          echo '```text'
          tail -n 200 test-results/pytest-output.txt
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
        exit 1
